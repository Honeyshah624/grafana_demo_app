tempo:
  registry: 454143665149.dkr.ecr.ap-south-1.amazonaws.com
  repository: observability/tempo
  tag: 2.6.1
  pullPolicy: IfNotPresent

  memBallastSizeMbs: 128

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  storage:
    trace:
      backend: s3
      wal:
        path: /var/tempo/wal
      s3:
        bucket: retail-tempo-traces-454143665149
        endpoint: s3.ap-south-1.amazonaws.com
        region: ap-south-1
        insecure: false

persistence:
  enabled: false

service:
  type: ClusterIP

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 768Mi