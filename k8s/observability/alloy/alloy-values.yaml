image:
  registry: 454143665149.dkr.ecr.ap-south-1.amazonaws.com
  repository: observability/alloy
  tag: latest
  pullPolicy: IfNotPresent

controller:
  type: daemonset

serviceAccount:
  create: true
  name: alloy

rbac:
  create: true

alloy:
  configMap:
    create: true
    content: |-
      prometheus.remote_write "mimir" {
        endpoint {
          url = "http://mimir-gateway.monitoring.svc.cluster.local/api/v1/push"
        }
      }

      prometheus.scrape "kube_state_metrics" {
        targets = [{
          __address__ = "kube-state-metrics.monitoring.svc.cluster.local:8080",
          job = "kube-state-metrics",
        }]
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pod_metrics" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          regex         = "true"
          action        = "keep"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
          regex         = "(.+)"
          target_label  = "__metrics_path__"
        }

        rule {
          source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
          regex         = "([^:]+)(?::\\d+)?;(\\d+)"
          replacement   = "$1:$2"
          target_label  = "__address__"
        }

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label  = "app"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }
      }

      prometheus.scrape "pod_metrics" {
        targets    = discovery.relabel.pod_metrics.output
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      discovery.kubernetes "nodes" {
        role = "node"
      }

      discovery.relabel "cadvisor" {
        targets = discovery.kubernetes.nodes.targets

        rule {
          target_label = "__address__"
          replacement  = "kubernetes.default.svc.cluster.local:443"
        }

        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          regex         = "(.+)"
          target_label  = "__metrics_path__"
          replacement   = "/api/v1/nodes/$1/proxy/metrics/cadvisor"
        }
      }

      prometheus.scrape "cadvisor" {
        targets           = discovery.relabel.cadvisor.output
        scheme            = "https"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"

        tls_config {
          insecure_skip_verify = true
        }

        forward_to = [prometheus.remote_write.mimir.receiver]
      }

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 512Mi