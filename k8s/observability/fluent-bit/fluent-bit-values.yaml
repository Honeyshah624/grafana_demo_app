
kind: DaemonSet

nodeSelector:
  kubernetes.io/arch: amd64

iimage:
  repository: 454143665149.dkr.ecr.ap-south-1.amazonaws.com/fluent-bit
  tag: "3.2.10-multiarch"
  pullPolicy: IfNotPresent
env:
  - name: ES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: retail-logs-es-elastic-user
        key: elastic

resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    memory: 128Mi

tolerations:
  - operator: Exists

config:
  service: |
    [SERVICE]
        Flush                     5
        Daemon                    Off
        Log_Level                 info
        Parsers_File              parsers.conf
        HTTP_Server               On
        HTTP_Listen               0.0.0.0
        HTTP_Port                 2020
        Health_Check              On

  inputs: |
    [INPUT]
        Name                      tail
        Path                      /var/log/containers/*.log
        Parser                    cri
        Tag                       kube.*
        Mem_Buf_Limit             50MB
        Skip_Long_Lines           On
        Refresh_Interval          10
        

  filters: |
    [FILTER]
        Name                      kubernetes
        Match                     kube.*
        Kube_URL                  https://kubernetes.default.svc:443
        Kube_CA_File              /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File           /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log                 On
        Keep_Log                  On
        K8S-Logging.Parser        On
        K8S-Logging.Exclude       Off

  outputs: |
    [OUTPUT]
        Name                      es
        Match                     kube.*
        Host                      retail-logs-es-http.logging.svc.cluster.local
        Port                      9200
        TLS                       On
        TLS.Verify                Off
        HTTP_User                 elastic
        HTTP_Passwd               ${ES_PASSWORD}
        Logstash_Format           On
        Logstash_Prefix           fluentbit
        Suppress_Type_Name        On
        Retry_Limit               False

  customParsers: |
    [PARSER]
        Name                      cri
        Format                    regex
        Regex                     ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key                  time
        Time_Format               %Y-%m-%dT%H:%M:%S.%L%z
